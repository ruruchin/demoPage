<svg width="897" height="544" viewBox="0 0 897 544" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes body-breathe {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-5px) scale(1.02);
      }
    }

    @keyframes eyes-look-blink {
      0%, 12% {
        transform: translate(0, 0) scaleY(1);
      }
      14% {
        transform: translate(0, 0) scaleY(0.1);
      }
      16%, 38% {
        transform: translate(0, 0) scaleY(1);
      }
      48%, 58% {
        transform: translate(8px, -4px) scaleY(1);
      }
      68%, 78% {
        transform: translate(-8px, 4px) scaleY(1);
      }
      88%, 96% {
        transform: translate(0, 0) scaleY(1);
      }
      98% {
        transform: translate(0, 0) scaleY(0.1);
      }
      100% {
        transform: translate(0, 0) scaleY(1);
      }
    }

    .body {
      animation: body-breathe 6s ease-in-out infinite;
      transform-origin: center;
      transform-box: fill-box;
    }

    .eyes {
      animation: eyes-look-blink 10s ease-in-out infinite;
      transform-origin: center;
      transform-box: fill-box;
    }

    @media (prefers-reduced-motion: reduce) {
      .body,
      .eyes {
        animation: none;
      }
    }
  </style>

