<svg width="897" height="544" viewBox="0 0 897 544" fill="none" xmlns="http://www.w3.org/2000/svg">
  <style>
    @keyframes body-breathe {
      0%, 100% {
        transform: translateY(0) scale(1);
      }
      50% {
        transform: translateY(-5px) scale(1.02);
      }
    }

    @keyframes eyes-look-blink {
      0%, 10% {
        transform: translate(0, 0) scaleY(1);
      }
      12% {
        transform: translate(0, 0) scaleY(0.1);
      }
      14% {
        transform: translate(0, 0) scaleY(1);
      }
      30% {
        transform: translate(0, 0) scaleY(1);
      }
      35%, 45% {
        transform: translate(12px, -8px) scaleY(1);
      }
      46% {
        transform: translate(12px, -8px) scaleY(0.1);
      }
      48% {
        transform: translate(12px, -8px) scaleY(1);
      }
      55%, 65% {
        transform: translate(-12px, 6px) scaleY(1);
      }
      66% {
        transform: translate(-12px, 6px) scaleY(0.1);
      }
      68% {
        transform: translate(-12px, 6px) scaleY(1);
      }
      80%, 90% {
        transform: translate(0, 0) scaleY(1);
      }
      92% {
        transform: translate(0, 0) scaleY(0.1);
      }
      94%, 100% {
        transform: translate(0, 0) scaleY(1);
      }
    }

    .body {
      animation: body-breathe 6s ease-in-out infinite;
      transform-origin: center;
      transform-box: fill-box;
    }

    .eyes {
      animation: eyes-look-blink 8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
      transform-origin: center;
      transform-box: fill-box;
    }
  </style>
  
